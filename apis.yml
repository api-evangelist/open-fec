aid: open-fec
name: OpenFEC
description: >-
  The Federal Election Commission (FEC) API is a RESTful web service supporting full-text and field-specific searches on
  FEC data. Bulk downloads are available on the current site. Information is tied to the underlying forms by file ID and
  image ID. Data are updated nightly.
type: Index

naftiko: 1.0.0-alpha2
info:
  label: OpenFEC API
  description: The OpenFEC API is a RESTful web service from the Federal Election Commission supporting full-text and field-specific
    searches on FEC data including candidates, committees, filings, financial summaries, and transaction schedules. Data are
    updated nightly.
  tags:
  - Open
  - Fec
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: open-fec
    baseUri: https://api.open.fec.gov/v1
    description: OpenFEC API HTTP API.
    authentication:
      type: apikey
      in: query
      name: api_key
      value: '{{OPEN_FEC_TOKEN}}'
    resources:
    - name: candidates
      path: /candidates/
      operations:
      - name: listcandidates
        method: GET
        description: List candidates
        inputParameters:
        - name: q
          in: query
          type: string
          description: Full-text search.
        - name: candidate_id
          in: query
          type: array
        - name: cycle
          in: query
          type: array
        - name: office
          in: query
          type: array
        - name: state
          in: query
          type: string
        - name: party
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: candidates-search
      path: /candidates/search/
      operations:
      - name: searchcandidates
        method: GET
        description: Search candidates with principal committees
        inputParameters:
        - name: q
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: candidate-candidate-id
      path: /candidate/{candidate_id}
      operations:
      - name: getcandidate
        method: GET
        description: Retrieve a single candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: candidate-candidate-id-totals
      path: /candidate/{candidate_id}/totals/
      operations:
      - name: getcandidatetotals
        method: GET
        description: Candidate financial totals
        inputParameters:
        - name: cycle
          in: query
          type: array
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: candidate-candidate-id-committees
      path: /candidate/{candidate_id}/committees/
      operations:
      - name: getcandidatecommittees
        method: GET
        description: Committees associated with a candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: committees
      path: /committees/
      operations:
      - name: listcommittees
        method: GET
        description: List committees
        inputParameters:
        - name: q
          in: query
          type: string
        - name: committee_id
          in: query
          type: array
        - name: committee_type
          in: query
          type: string
        - name: cycle
          in: query
          type: array
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: committee-committee-id
      path: /committee/{committee_id}
      operations:
      - name: getcommittee
        method: GET
        description: Retrieve a single committee
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: committee-committee-id-totals
      path: /committee/{committee_id}/totals/
      operations:
      - name: getcommitteetotals
        method: GET
        description: Committee financial totals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: filings
      path: /filings/
      operations:
      - name: listfilings
        method: GET
        description: List filings
        inputParameters:
        - name: candidate_id
          in: query
          type: array
        - name: committee_id
          in: query
          type: array
        - name: form_type
          in: query
          type: array
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: schedules-schedule-a
      path: /schedules/schedule_a/
      operations:
      - name: listschedulea
        method: GET
        description: Itemized individual contributions (Schedule A)
        inputParameters:
        - name: contributor_name
          in: query
          type: string
        - name: committee_id
          in: query
          type: array
        - name: two_year_transaction_period
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: schedules-schedule-b
      path: /schedules/schedule_b/
      operations:
      - name: listscheduleb
        method: GET
        description: Itemized disbursements (Schedule B)
        inputParameters:
        - name: committee_id
          in: query
          type: array
        - name: recipient_name
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: schedules-schedule-e
      path: /schedules/schedule_e/
      operations:
      - name: listschedulee
        method: GET
        description: Independent expenditures (Schedule E)
        inputParameters:
        - name: candidate_id
          in: query
          type: array
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: elections
      path: /elections/
      operations:
      - name: listelections
        method: GET
        description: Election summaries by office, cycle, and district
        inputParameters:
        - name: cycle
          in: query
          type: integer
        - name: office
          in: query
          type: string
        - name: state
          in: query
          type: string
        - name: district
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: names-candidates
      path: /names/candidates/
      operations:
      - name: candidatenames
        method: GET
        description: Candidate name typeahead
        inputParameters:
        - name: q
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: names-committees
      path: /names/committees/
      operations:
      - name: committeenames
        method: GET
        description: Committee name typeahead
        inputParameters:
        - name: q
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.

      - method: GET
        name: listelections
        description: Election summaries by office, cycle, and district
        call: open-fec.listelections
        with:
          cycle: rest.cycle
          office: rest.office
          state: rest.state
          district: rest.district
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/filings

        description: Candidate financial totals
        call: open-fec.getcandidatetotals
        with:
          cycle: rest.cycle
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/candidates
      name: candidates
      description: REST surface for candidates.
      operations:

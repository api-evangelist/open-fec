naftiko: 1.0.0-alpha2
info:
  label: OpenFEC API
  description: 'OpenFEC API. 15 operations. Lead operation: Retrieve a single candidate. Self-contained Naftiko capability
    covering one Open Fec business surface.'
  tags:
  - Open Fec
  - OpenFEC API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPEN_FEC_API_KEY: OPEN_FEC_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-fec
    baseUri: https://api.open.fec.gov/v1
    description: OpenFEC API business capability. Self-contained, no shared references.
    resources:
    - name: candidate-candidate_id
      path: /candidate/{candidate_id}
      operations:
      - name: getcandidate
        method: GET
        description: Retrieve a single candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: candidate-candidate_id-committees
      path: /candidate/{candidate_id}/committees/
      operations:
      - name: getcandidatecommittees
        method: GET
        description: Committees associated with a candidate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: candidate-candidate_id-totals
      path: /candidate/{candidate_id}/totals/
      operations:
      - name: getcandidatetotals
        method: GET
        description: Candidate financial totals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cycle
          in: query
          type: array
    - name: candidates
      path: /candidates/
      operations:
      - name: listcandidates
        method: GET
        description: List candidates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: Full-text search.
        - name: candidate_id
          in: query
          type: array
        - name: cycle
          in: query
          type: array
        - name: office
          in: query
          type: array
        - name: state
          in: query
          type: string
        - name: party
          in: query
          type: string
    - name: candidates-search
      path: /candidates/search/
      operations:
      - name: searchcandidates
        method: GET
        description: Search candidates with principal committees
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
    - name: committee-committee_id
      path: /committee/{committee_id}
      operations:
      - name: getcommittee
        method: GET
        description: Retrieve a single committee
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: committee-committee_id-totals
      path: /committee/{committee_id}/totals/
      operations:
      - name: getcommitteetotals
        method: GET
        description: Committee financial totals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: committees
      path: /committees/
      operations:
      - name: listcommittees
        method: GET
        description: List committees
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
        - name: committee_id
          in: query
          type: array
        - name: committee_type
          in: query
          type: string
        - name: cycle
          in: query
          type: array
    - name: elections
      path: /elections/
      operations:
      - name: listelections
        method: GET
        description: Election summaries by office, cycle, and district
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cycle
          in: query
          type: integer
        - name: office
          in: query
          type: string
        - name: state
          in: query
          type: string
        - name: district
          in: query
          type: string
    - name: filings
      path: /filings/
      operations:
      - name: listfilings
        method: GET
        description: List filings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: candidate_id
          in: query
          type: array
        - name: committee_id
          in: query
          type: array
        - name: form_type
          in: query
          type: array
    - name: names-candidates
      path: /names/candidates/
      operations:
      - name: candidatenames
        method: GET
        description: Candidate name typeahead
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
    - name: names-committees
      path: /names/committees/
      operations:
      - name: committeenames
        method: GET
        description: Committee name typeahead
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
    - name: schedules-schedule_a
      path: /schedules/schedule_a/
      operations:
      - name: listschedulea
        method: GET
        description: Itemized individual contributions (Schedule A)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contributor_name
          in: query
          type: string
        - name: committee_id
          in: query
          type: array
        - name: two_year_transaction_period
          in: query
          type: integer
    - name: schedules-schedule_b
      path: /schedules/schedule_b/
      operations:
      - name: listscheduleb
        method: GET
        description: Itemized disbursements (Schedule B)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: committee_id
          in: query
          type: array
        - name: recipient_name
          in: query
          type: string
    - name: schedules-schedule_e
      path: /schedules/schedule_e/
      operations:
      - name: listschedulee
        method: GET
        description: Independent expenditures (Schedule E)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: candidate_id
          in: query
          type: array
    authentication:
      type: apikey
      key: api_key
      value: '{{env.OPEN_FEC_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: open-fec-rest
    port: 8080
    description: REST adapter for OpenFEC API. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/candidate/{candidate-id}
      name: candidate-candidate-id
      description: REST surface for candidate-candidate_id.
      operations:
      - method: GET
        name: getcandidate
        description: Retrieve a single candidate
        call: open-fec.getcandidate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/candidate/{candidate-id}/committees
      name: candidate-candidate-id-committees
      description: REST surface for candidate-candidate_id-committees.
      operations:
      - method: GET
        name: getcandidatecommittees
        description: Committees associated with a candidate
        call: open-fec.getcandidatecommittees
        outputParameters:
        - type: object

        description: List candidates
        call: open-fec.listcandidates
        with:
          q: rest.q
          candidate_id: rest.candidate_id
          cycle: rest.cycle
          office: rest.office
          state: rest.state
          party: rest.party
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/candidates/search

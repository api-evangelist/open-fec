  - type: mcp
    namespace: open-fec-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenFEC API. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: retrieve-single-candidate
      description: Retrieve a single candidate
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-fec.getcandidate
      outputParameters:
      - type: object
        mapping: $.
    - name: committees-associated-candidate
      description: Committees associated with a candidate
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-fec.getcandidatecommittees
      outputParameters:
      - type: object
        mapping: $.
    - name: candidate-financial-totals
      description: Candidate financial totals
      hints:

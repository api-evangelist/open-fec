        mapping: $.
    - name: list-candidates
      description: List candidates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-fec.listcandidates
      with:
        q: tools.q
        candidate_id: tools.candidate_id
        cycle: tools.cycle
        office: tools.office
        state: tools.state
        party: tools.party
      outputParameters:
